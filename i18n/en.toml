# Homepage – How It Works (how-it-works.html)
# ──────────────────────────────────────────────

[howItWorksLabel]
other = "How it works"

[howItWorksTitle]
other = "From business risk to proven detection"

[howItWorksLede]
other = "Most detection tools start with a rule. We start with the risk the rule is supposed to protect, and we do not stop until coverage is proven, measured, and safe to retire."

[howItWorksRiskTitle]
other = "Model the business"

[howItWorksRiskDesc]
other = "Declare your services, crown-jewel data, and attack paths. Industry profile and threat briefs weight every technique by actual risk to you."

[howItWorksThreatTitle]
other = "Map the gaps"

[howItWorksThreatDesc]
other = "Every MITRE ATT&CK technique on your attack paths gets scored for exposure. See exactly which uncovered techniques matter, ranked by weight."

[howItWorksHuntTitle]
other = "Prove the hypothesis"

[howItWorksHuntDesc]
other = "Launch a hunt against your live SIEMs. Cluster hits. Verdict them. Keep only what fires on real adversary behavior, and discard the noise."

[howItWorksRuleTitle]
other = "Promote with confidence"

[howItWorksRuleDesc]
other = "Turn a winning hunt into a Sigma rule with tests, compile to every SIEM dialect, and deploy through impact preview + approval gates."

[howItWorksCoverageTitle]
other = "Prove, monitor, retire"

[howItWorksCoverageDesc]
other = "Watch health and noise in real time. Catch silently broken rules the day they die. Feed results back into risk, and the loop closes."

# Legacy keys retained for pages still using them.
[howItWorksStep1Title]
other = "Connect & import"

[howItWorksStep1Desc]
other = "Connect your SIEM and import existing rules; they're auto-converted to Sigma for portability. Or start from our TI feed and standard rules repo."

[howItWorksStep2Title]
other = "Generate & test"

[howItWorksStep2Desc]
other = "Generate or write rules with tests, in code or the web UI. Run them live on your SIEM to validate before promotion."

[howItWorksStep3Title]
other = "Approve & deploy"

[howItWorksStep3Desc]
other = "Review impact before production. Deploy with approval workflows. Rollback in one click. Measure coverage and quality continuously."

